<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Opening</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: radial-gradient(ellipse at center, #1a1210 0%, #060404 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  gap: 22px;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Perspective container */
.scene {
  perspective: 1600px;
  perspective-origin: 56% 50%;
}

/* Concrete wall */
.wall {
  position: relative;
  width: 600px;
  height: 720px;
  background: radial-gradient(ellipse at 50% 40%, #302820 0%, #1c1510 55%, #0e0b08 100%);
  border-radius: 8px;
  box-shadow: 0 0 100px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  overflow: visible;
}

/* Safe cavity / opening */
.cavity {
  position: absolute;
  left: 100px; top: 80px;
  width: 400px; height: 560px;
  background: #08090a;
  overflow: hidden;
}

/* Interior ambient light — brightens as door opens */
.cavity-light {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 60% 52%,
    rgba(200,170,90,0.28) 0%,
    rgba(160,130,60,0.12) 45%,
    transparent 75%);
  opacity: 0;
  animation: light-bloom 2.3s ease-out 2.05s forwards;
}
@keyframes light-bloom {
  0%   { opacity: 0; }
  30%  { opacity: 0.35; }
  100% { opacity: 1; }
}

/* Dark mask that slides off to the LEFT as the door sweeps open.
   Door hinge is on the LEFT, so the right edge of the door clears first.
   We wipe the mask from right→left by shrinking its left clip boundary. */
.cavity-mask {
  position: absolute; inset: 0;
  background: #000;
  /* start: fully covering — clip-path inset(0 0 0 0) = whole rect */
  animation: mask-wipe 2.6s cubic-bezier(0.4, 0.05, 0.18, 1.0) 2.05s forwards;
}
@keyframes mask-wipe {
  0%   { clip-path: inset(0 0% 0 0%); }   /* fully black */
  100% { clip-path: inset(0 100% 0 0%); } /* fully cleared right→left */
}

/* Edge shadow that stays at the left wall of the cavity (depth effect) */
.cavity-edge {
  position: absolute; inset: 0;
  background:
    linear-gradient(90deg, rgba(0,0,0,0.85) 0%, transparent 18%),
    linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 12%),
    linear-gradient(0deg,   rgba(0,0,0,0.5) 0%, transparent 10%);
  pointer-events: none;
}

/* Safe interior items — always rendered, revealed by mask */
.interior {
  position: absolute;
  inset: 20px 18px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 28px;
}

.shelf { display: flex; justify-content: center; }
.shelf-bills {
  padding-bottom: 14px;
  border-bottom: 2px solid rgba(255,255,255,0.07);
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
}

/* ===================== DOOR ===================== */
.door-wrap {
  position: absolute;
  left: 100px; top: 80px;
  width: 400px; height: 560px;
  transform-origin: 0% 50%;
  transform-style: preserve-3d;
  animation: swing-open 2.6s cubic-bezier(0.4, 0.05, 0.18, 1.0) 2.05s forwards;
}
@keyframes swing-open {
  0%   { transform: rotateY(0deg); }
  100% { transform: rotateY(-130deg); }
}

/* Front face */
.door-front {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #484F56 0%, #3D4449 48%, #353C42 100%);
  border: 5px solid #6C7480;
  box-shadow: 4px 0 18px rgba(0,0,0,0.4);
  backface-visibility: hidden;
  overflow: visible;
}

/* Recessed inner panel */
.door-panel {
  position: absolute; inset: 30px;
  background: linear-gradient(150deg, #3A4046 0%, #2D3438 100%);
  border: 2px solid #545C64;
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.45);
}

/* Back face (inside of door) */
.door-back {
  position: absolute; inset: 0;
  background: linear-gradient(130deg, #252A2E 0%, #1E2226 100%);
  border: 4px solid #424A50;
  transform: rotateY(180deg);
  backface-visibility: hidden;
}

/* Hinges */
.hinge {
  position: absolute;
  left: -5px;
  width: 13px;
  background: linear-gradient(90deg, #545C66, #9BA5AE, #545C66);
  border-radius: 3px;
  border: 1px solid #B2BCC6;
  box-shadow: -2px 0 6px rgba(0,0,0,0.5);
  z-index: 2;
}
.hinge-t { top: 66px; height: 74px; }
.hinge-b { bottom: 66px; height: 74px; }

/* Corner bolts (decorative) */
.corner {
  position: absolute;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle at 36% 30%, #666E7A, #363C46);
  border: 2px solid #7C8494;
}
.c-tl { top: 11px;  left: 11px; }
.c-tr { top: 11px;  right: 11px; }
.c-bl { bottom: 11px; left: 11px; }
.c-br { bottom: 11px; right: 11px; }

/* ===================== LOCKING BOLTS ===================== */
.bolt {
  position: absolute;
  background: linear-gradient(180deg, #5E6672, #4A5260, #5E6672);
  border-radius: 4px;
  border: 2px solid #8A94A2;
  box-shadow: 0 1px 5px rgba(0,0,0,0.5);
}
/* Right — 3 bolts */
.br1 { right: -58px; top: 138px; width: 58px; height: 23px;
  animation: ret-r .28s ease-out 1.72s forwards; }
.br2 { right: -58px; top: 278px; width: 58px; height: 23px;
  animation: ret-r .28s ease-out 1.80s forwards; }
.br3 { right: -58px; top: 418px; width: 58px; height: 23px;
  animation: ret-r .28s ease-out 1.88s forwards; }
/* Top — 2 bolts */
.bt1 { top: -50px; left: 84px;  width: 23px; height: 50px;
  animation: ret-t .28s ease-out 1.72s forwards; }
.bt2 { top: -50px; left: 284px; width: 23px; height: 50px;
  animation: ret-t .28s ease-out 1.80s forwards; }
/* Bottom — 2 bolts */
.bb1 { bottom: -50px; left: 84px;  width: 23px; height: 50px;
  animation: ret-b .28s ease-out 1.72s forwards; }
.bb2 { bottom: -50px; left: 284px; width: 23px; height: 50px;
  animation: ret-b .28s ease-out 1.80s forwards; }

@keyframes ret-r { to { transform: translateX(62px); } }
@keyframes ret-t { to { transform: translateY(-54px); } }
@keyframes ret-b { to { transform: translateY(54px);  } }

/* ===================== COMBINATION DIAL ===================== */
.dial-area {
  position: absolute;
  top: 92px;
  left: 50%;
  transform: translateX(-50%);
}

.dial-bezel {
  width: 186px; height: 186px;
  border-radius: 50%;
  background: radial-gradient(circle at 32% 28%, #2C2E34, #131518);
  border: 6px solid #ACB4C0;
  box-shadow: 0 0 24px rgba(0,0,0,0.7), inset 0 0 18px rgba(0,0,0,0.9);
  display: flex; justify-content: center; align-items: center;
  position: relative;
}

/* Reference tick at 12 o'clock */
.dial-notch {
  position: absolute;
  top: 7px; left: 50%;
  transform: translateX(-50%);
  width: 5px; height: 15px;
  background: #CCD4DC;
  border-radius: 2px;
}

.dial-face {
  width: 140px; height: 140px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 34%, #2E3240, #181A20);
  border: 2px solid #5C6474;
  display: flex; justify-content: center; align-items: center;
}

.dial-knob {
  width: 74px; height: 74px;
  border-radius: 50%;
  background: radial-gradient(circle at 36% 31%, #626A7A, #363C4A);
  border: 3px solid #8A94A2;
  box-shadow: 0 3px 12px rgba(0,0,0,0.75);
  animation: spin-combo 2.0s ease-in-out 0.05s both;
  position: relative;
}
.dial-knob::before {   /* indicator mark */
  content: '';
  position: absolute;
  top: 9px; left: 50%;
  transform: translateX(-50%);
  width: 5px; height: 14px;
  background: linear-gradient(180deg, #CCD4DC, #8892A0);
  border-radius: 3px;
}
@keyframes spin-combo {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(1260deg); }  /* 3.5 full turns */
}

/* ===================== HANDLE ===================== */
.handle-area {
  position: absolute;
  top: 372px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 212px;
}
.handle-stem {
  width: 22px; height: 76px;
  background: linear-gradient(90deg, #464E5A, #6E7882, #464E5A);
  border-radius: 4px;
  border: 1px solid #7E8898;
}
.handle-bar {
  width: 212px; height: 36px;
  background: linear-gradient(180deg, #858F98 0%, #6E7880 45%, #525A62 100%);
  border-radius: 18px;
  border: 3px solid #AAB6BE;
  box-shadow: 0 4px 14px rgba(0,0,0,0.6), inset 0 1px 3px rgba(255,255,255,0.10);
}

/* ===================== LABELS ===================== */
.vault-name {
  position: absolute;
  top: 316px;
  left: 50%;
  transform: translateX(-50%);
  color: #9AAAB4;
  font-size: 28px;
  font-weight: 900;
  font-family: Georgia, serif;
  letter-spacing: 10px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  white-space: nowrap;
}
.mfg-name {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: #50585E;
  font-size: 9px;
  letter-spacing: 3px;
  white-space: nowrap;
}

/* ===================== REPLAY BUTTON ===================== */
.replay-btn {
  padding: 10px 34px;
  background: transparent;
  border: 1px solid rgba(180,180,180,0.25);
  color: rgba(180,180,180,0.45);
  font-size: 11px;
  letter-spacing: 4px;
  cursor: pointer;
  border-radius: 2px;
  transition: border-color .3s, color .3s;
}
.replay-btn:hover {
  border-color: rgba(180,180,180,0.55);
  color: rgba(210,210,210,0.75);
}
</style>
</head>

            <g transform="translate(126,54)">

<script>
